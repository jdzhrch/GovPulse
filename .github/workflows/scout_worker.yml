name: Scout Mission Worker

on:
  # Allow manual dispatch with parameters from frontend
  workflow_dispatch:
    inputs:
      market:
        description: 'Target market code (e.g., US, EU, ID)'
        required: true
        type: string
      domain:
        description: 'Policy domain to scan'
        required: true
        type: choice
        options:
          - all
          - minor_protection
          - ecommerce
          - data_sovereignty
          - content_moderation
      lookback_days:
        description: 'Number of days to look back'
        required: false
        default: '90'
        type: string
      trigger_event:
        description: 'Description of triggering event'
        required: false
        type: string

  # Schedule regular scans for priority markets
  schedule:
    # Run daily at 6 AM UTC for Tier 1 markets
    - cron: '0 6 * * *'

jobs:
  scout-mission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -q requests python-dateutil

      - name: Run Scout Mission
        id: scout
        env:
          MARKET: ${{ github.event.inputs.market || 'US' }}
          DOMAIN: ${{ github.event.inputs.domain || 'all' }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '90' }}
          TRIGGER_EVENT: ${{ github.event.inputs.trigger_event || 'Scheduled scan' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd engines
          python -c "
          import os
          import json
          from datetime import datetime
          from scout_engine import ScoutEngine
          from impact_analyzer import ImpactAnalyzer

          # Get parameters from environment
          market = os.environ.get('MARKET', 'US')
          domain = os.environ.get('DOMAIN', 'all')
          lookback_days = int(os.environ.get('LOOKBACK_DAYS', '90'))
          trigger_event = os.environ.get('TRIGGER_EVENT', 'Manual trigger')

          print(f'=== GovPulse Scout Mission ===')
          print(f'Market: {market}')
          print(f'Domain: {domain}')
          print(f'Lookback: {lookback_days} days')
          print(f'Trigger: {trigger_event}')
          print()

          # Initialize engines
          scout = ScoutEngine('../knowledge/internal_baseline.md')
          analyzer = ImpactAnalyzer('../knowledge/internal_baseline.md')

          # Create and execute mission
          mission = scout.create_mission(
              market=market,
              domain=domain,
              lookback_days=lookback_days,
              created_by='github_actions'
          )

          print(f'Mission ID: {mission.mission_id}')

          scout.execute_mission(mission.mission_id)

          print(f'Signals detected: {len(mission.signals)}')

          # Export mission results
          mission_path = scout.export_mission(mission.mission_id, '../data/history')
          print(f'Mission exported to: {mission_path}')

          # Analyze each signal
          if mission.signals:
              assessments = analyzer.analyze_mission(mission, analyst='github_actions')

              for assessment in assessments:
                  path = analyzer.export_assessment(assessment, '../data/history')
                  print(f'Assessment exported: {path}')

              # Generate summary
              summary = analyzer.generate_executive_summary(assessments)

              # Save summary
              summary_path = f'../data/history/SUMMARY-{mission.mission_id}.md'
              with open(summary_path, 'w') as f:
                  f.write(summary)
              print(f'Summary saved to: {summary_path}')

              # Output for GitHub Actions
              print(f'::set-output name=mission_id::{mission.mission_id}')
              print(f'::set-output name=signal_count::{len(mission.signals)}')
              print(f'::set-output name=assessment_count::{len(assessments)}')
          else:
              print('No signals detected for this mission.')
              print('::set-output name=mission_id::' + mission.mission_id)
              print('::set-output name=signal_count::0')
              print('::set-output name=assessment_count::0')
          "

      - name: Commit results to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add all new files in data/history
          git add data/history/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Scout mission results: ${{ github.event.inputs.market || 'scheduled' }} ${{ github.event.inputs.domain || 'all' }}

            Trigger: ${{ github.event.inputs.trigger_event || 'Scheduled scan' }}
            Workflow run: ${{ github.run_id }}"

            git push
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mission-results
          path: data/history/
          retention-days: 30

  # Build and deploy frontend after mission completes
  deploy-dashboard:
    needs: scout-mission
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Copy mission data to build
        run: |
          mkdir -p frontend/dist/data
          cp -r data/history frontend/dist/data/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
