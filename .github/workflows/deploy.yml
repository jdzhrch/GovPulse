name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'data/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
          VITE_GITHUB_REPO_OWNER: ${{ secrets.VITE_GITHUB_REPO_OWNER }}
          VITE_GITHUB_REPO_NAME: ${{ secrets.VITE_GITHUB_REPO_NAME }}

      - name: Copy data to build
        run: |
          mkdir -p frontend/dist/data/history
          cp -r data/history/* frontend/dist/data/history/ 2>/dev/null || echo "No history data yet"
          
          # Generate manifest.json for frontend data loading
          cd frontend/dist/data/history
          echo '{"files": [' > manifest.json
          first=true
          for f in MISSION-*.json IMPACT-*.json; do
            if [ -f "$f" ]; then
              if [ "$first" = true ]; then
                first=false
              else
                echo ',' >> manifest.json
              fi
              echo "\"$f\"" >> manifest.json
            fi
          done
          echo ']}' >> manifest.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard-build
          path: dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
